
<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>SubCall Live Captions</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    margin: 0;
    background: linear-gradient(180deg, #0D0D15, #141423, #0F0F1A);
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    display: flex;
    flex-direction: column;
    padding: max(16px, env(safe-area-inset-top)) 20px max(16px, env(safe-area-inset-bottom));
  }
  header { padding: 4px 0 12px; text-align: center; }
  h1 {
    font-size: 20px; font-weight: 800; letter-spacing: 2px; margin: 0 0 4px;
    background: linear-gradient(90deg, #00F2FE, #4FACFE);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .sub { font-size: 12px; color: rgba(255,255,255,0.5); }

  #setup { max-width: 360px; margin: 40px auto; width: 100%; text-align: center; }
  input {
    width: 100%; font-size: 24px; letter-spacing: 4px; text-align: center;
    padding: 14px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.05); color: #fff; margin-bottom: 14px;
  }
  input::placeholder { color: rgba(255,255,255,0.3); letter-spacing: 1px; font-size: 15px; }
  button.primary {
    width: 100%; padding: 14px; border-radius: 12px; border: none;
    font-weight: 700; font-size: 15px;
    background: linear-gradient(90deg, #00F2FE, #4FACFE); color: #000; cursor: pointer;
  }
  .hint { margin-top: 14px; font-size: 12px; color: rgba(255,255,255,0.4); line-height: 1.5; }

  #main { flex: 1; display: none; flex-direction: column; }
  .status {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    font-size: 12px; color: rgba(255,255,255,0.6); margin: 8px 0 14px;
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #F44336; }
  .dot.connecting { background: #FF9800; }
  .dot.connected { background: #4CAF50; }

  .caption-area {
    flex: 1; display: flex; flex-direction: column; gap: 14px;
    justify-content: center; padding: 20px 0;
  }
  .caption-card {
    width: 100%; max-width: 480px; margin: 0 auto;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 20px; padding: 24px 20px;
  }
  .label { font-size: 11px; letter-spacing: 1px; font-weight: 700; margin-bottom: 10px; }
  .label.partner { color: #00F2FE; }
  .label.you { color: #FF9800; }
  .caption-text { font-size: 24px; font-weight: 600; line-height: 1.35; word-break: break-word; }
  .placeholder { color: rgba(255,255,255,0.35); font-weight: 500; font-size: 17px; }
  .original-text { margin-top: 12px; font-size: 13px; color: rgba(255,255,255,0.4); word-break: break-word; }

  footer { text-align: center; padding: 16px 0 4px; }
  footer button {
    padding: 8px 18px; border-radius: 10px;
    background: transparent; border: 1px solid rgba(255,255,255,0.2);
    color: rgba(255,255,255,0.6); font-size: 12px; font-weight: 500; cursor: pointer;
  }
</style>
</head>
<body>

<header>
  <h1>SUBCALL</h1>
  <div class="sub">Live Captions Viewer</div>
</header>

<div id="setup">
  <input id="codeInput" type="tel" inputmode="numeric" maxlength="6" placeholder="Enter 6-digit code" />
  <button class="primary" id="connectBtn">Watch Live Captions</button>
  <div class="hint">Enter the session code from your partner's SubCall Android app. Put your partner's Android on loudspeaker so it can pick up your voice too.</div>
</div>

<div id="main">
  <div class="status">
    <div id="statusDot" class="dot"></div>
    <span id="statusText">Disconnected</span>
  </div>

  <div class="caption-area">
    <!-- What partner (Android user) says, translated to your language -->
    <div class="caption-card">
      <div class="label partner">PARTNER SAYS</div>
      <div id="partnerCaption" class="caption-text placeholder">Waiting for partner to speak...</div>
      <div id="partnerOriginal" class="original-text"></div>
    </div>

    <!-- What you (iPhone user) said, translated for the partner -->
    <div class="caption-card">
      <div class="label you">YOU SAID (heard by partner's Android)</div>
      <div id="myCaption" class="caption-text placeholder">Waiting for you to speak...</div>
      <div id="myOriginal" class="original-text"></div>
    </div>
  </div>

  <footer>
    <button id="disconnectBtn">Disconnect</button>
  </footer>
</div>

<script>
  const NTFY_BASE = "https://ntfy.sh";

  const setupEl = document.getElementById('setup');
  const mainEl = document.getElementById('main');
  const codeInput = document.getElementById('codeInput');
  const connectBtn = document.getElementById('connectBtn');
  const disconnectBtn = document.getElementById('disconnectBtn');
  const statusDot = document.getElementById('statusDot');
  const statusText = document.getElementById('statusText');
  const partnerCaption = document.getElementById('partnerCaption');
  const partnerOriginal = document.getElementById('partnerOriginal');
  const myCaption = document.getElementById('myCaption');
  const myOriginal = document.getElementById('myOriginal');

  let esPartner = null;
  let esMe = null;
  let sessionCode = '';

  function setStatus(state) {
    statusDot.className = 'dot ' + state;
    statusText.textContent =
      state === 'connected' ? 'Live' :
      state === 'connecting' ? 'Connecting...' : 'Disconnected';
  }

  function openStream(topic, onMsg) {
    const url = `${NTFY_BASE}/${topic}/sse`;
    const es = new EventSource(url);
    es.onopen = () => setStatus('connected');
    es.onerror = () => setStatus('connecting'); // auto-reconnects
    es.onmessage = (evt) => {
      try {
        const outer = JSON.parse(evt.data);
        const inner = JSON.parse(outer.message || '{}');
        onMsg(inner);
      } catch (e) { console.error('Bad message', e); }
    };
    return es;
  }

  connectBtn.addEventListener('click', () => {
    const code = codeInput.value.trim();
    if (!/^\d{6}$/.test(code)) {
      alert("Enter the 6-digit session code from the Android app.");
      return;
    }
    sessionCode = code;
    setupEl.style.display = 'none';
    mainEl.style.display = 'flex';
    setStatus('connecting');

    // Android publishes "partner" translations (translated FROM your voice INTO partner's lang)
    //   to topic: subcall_{code}_from_creator (mode="me")
    //   AND translations of partner's voice (heard via speaker) to (mode="partner")
    // We show both.
    esPartner = openStream(`subcall_${code}_from_creator_partner`, (data) => {
      // "Partner said" → this is the Android user's speech, translated for iPhone user
      partnerCaption.textContent = data.translatedText || '(no translation)';
      partnerCaption.classList.remove('placeholder');
      partnerOriginal.textContent = data.originalText ? '"' + data.originalText + '"' : '';
    });

    esMe = openStream(`subcall_${code}_from_creator_me`, (data) => {
      // "You said" → this is the iPhone user's speech captured via Android's speaker, translated back
      myCaption.textContent = data.translatedText || '(no translation)';
      myCaption.classList.remove('placeholder');
      myOriginal.textContent = data.originalText ? '"' + data.originalText + '"' : '';
    });
  });

  disconnectBtn.addEventListener('click', () => {
    if (esPartner) { try { esPartner.close(); } catch(e){} esPartner = null; }
    if (esMe) { try { esMe.close(); } catch(e){} esMe = null; }
    setupEl.style.display = 'block';
    mainEl.style.display = 'none';
    partnerCaption.textContent = 'Waiting for partner to speak...';
    partnerCaption.classList.add('placeholder');
    partnerOriginal.textContent = '';
    myCaption.textContent = 'Waiting for you to speak...';
    myCaption.classList.add('placeholder');
    myOriginal.textContent = '';
    setStatus('disconnected');
  });
</script>
</body>
</html>
